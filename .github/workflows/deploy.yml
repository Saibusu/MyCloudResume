name: Deploy Fullstack Resume (S3 + Lambda + Cloudflare)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 1. AWS 憑證配置 ---
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # --- 2. 前端部署 (S3) ---
      - name: Deploy frontend to S3
        run: aws s3 sync ./frontend s3://saibusu.com --delete

      # --- 3. 後端環境準備 (Node.js & Yarn) ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
         #cache: 'yarn'

      - name: Install dependencies
        run: |
          yarn install  # 必須先安裝，才會產生 node_modules

      # --- 4. Prisma Client 產生 ---
      - name: Generate Prisma Client
        run: |
          # 確保清理並使用專案內的 yarn 執行，避免 npx 模組遺失問題
          rm -rf node_modules/.prisma
          yarn prisma generate

      # --- 5. 打包 Lambda (含 Prisma 與 Node 模組) ---
      - name: Zip Lambda function
        run: |
          # 1. 確保 index.mjs 在根目錄
          cp backend/index.mjs ./index.mjs
          
          # 2. 徹底清理 node_modules，僅保留必要引擎
          # 針對 Node 22 (Amazon Linux 2023) 使用的引擎檔案
          find node_modules/.prisma/client -name "*.node" -not -name "*linux-arm64*" -delete
          
          # 3. 刪除 Prisma 大型編譯工具（生成 Client 後已不需要）
          rm -rf node_modules/@prisma/engines
          rm -rf node_modules/prisma
          rm -rf node_modules/@prisma/config
          
          # 4. 精確打包：只打包 index.mjs 與產生的 node_modules
          # 軒杰：不要打包整個專案根目錄，這會導致檔案結構混亂
          zip -r function.zip index.mjs node_modules

      # --- 6. 部署到 AWS Lambda ---
      - name: Deploy to AWS Lambda
        run: |
          aws s3 cp function.zip s3://saibusu.com/deploy/function.zip
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --s3-bucket saibusu.com \
            --s3-key deploy/function.zip
          
          # 軒杰，加入這個延遲可以避免 AWS 資源衝突錯誤
          echo "等待 Lambda 更新完成..."
          sleep 10

      # --- 6.5 更新 Lambda 環境變數（注入 NeonDB 連線字串）---
      - name: Update Lambda environment variables
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --environment "Variables={DATABASE_URL=${{ secrets.DATABASE_URL }}}"

      # --- 7. 清除 Cloudflare 快取 (選用，若你有設定) ---
      - name: Purge Cloudflare cache
        uses: jakejarvis/cloudflare-purge-action@master
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}