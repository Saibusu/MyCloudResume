name: Deploy Fullstack Resume (S3 + Lambda + Cloudflare)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- 1. AWS 憑證配置 ---
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # --- 2. 前端部署 (S3) ---
      - name: Deploy frontend to S3
        run: aws s3 sync ./frontend s3://saibusu.com --delete

      # --- 3. 後端環境準備 (Node.js & Yarn) ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
         #cache: 'yarn'

      - name: Install dependencies
        run: 
          # 先清理舊的 client，確保 WASM 檔案能重新生成
          rm -rf node_modules/.prisma
          npx prisma generate

      # --- 4. Prisma Client 產生 ---
      - name: Generate Prisma Client
        run: npx prisma generate

      # --- 5. 打包 Lambda (含 Prisma 與 Node 模組) ---
      - name: Zip Lambda function
        run: |
          ls -R backend/  # 噴出路徑日誌，幫助我們 Debug
          cp backend/index.mjs ./index.mjs
          zip -r function.zip index.mjs node_modules prisma

      # --- 6. 部署到 AWS Lambda ---
      - name: Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://function.zip

      # --- 6.5 更新 Lambda 環境變數（注入 NeonDB 連線字串）---
      - name: Update Lambda environment variables
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --environment "Variables={DATABASE_URL=${{ secrets.DATABASE_URL }}}"

      # --- 7. 清除 Cloudflare 快取 (選用，若你有設定) ---
      - name: Purge Cloudflare cache
        uses: jakejarvis/cloudflare-purge-action@master
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}